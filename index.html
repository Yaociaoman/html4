<!DOCTYPE html>
<html>
<head>
<title>Image</title>

<style>
    .img-left{
        width: 33%; 
        border-radius: 18px;
    }

    .img-circle{
        width: 150px;
        height: 150px;
        border: 5px solid #ccc;
        border-radius: 50%;
        object-fit: cover;
    }

    .img-right{
        width: 33%;
        height: 300px;
        object-fit: fill;
    }


</style>
</head>
<body>

<img src="https://upload.wikimedia.org/wikipedia/commons/3/3e/天津意式风情区街景.jpg" class="img-left">
<img src="https://upload.wikimedia.org/wikipedia/commons/b/bd/光復路街景.JPG" class="img-circle">
<img src="https://upload.wikimedia.org/wikipedia/commons/3/3e/天津意式风情区街景.jpg" class="img-right">

</body>
</html>
