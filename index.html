<!DOCTYPE html>
<html>
<head>
<title>Image</title>

<style>
    img-left{
        width: 33%; 
        border-radius: 18px;
    }

    img-circle{
        width: 150px;
        height: 150px;
        border: 5px solid #ccc;
        border-radius: 50%;
        object-fit: cover;
    }

    img-right{
        width: 33%;
        height: 300px;
        object-fit: fill;
    }


</style>
</head>
<body>

<img src="https://share.google/16iVlK9FpcpHJulX0" class="img-left">
<img src="https://share.google/RuAJjJJuuUY06BJrr" class="img-circle">
<img src="https://share.google/16iVlK9FpcpHJulX0" class="img-right">

</body>
</html>
